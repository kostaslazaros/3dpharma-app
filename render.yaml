services:
  # ---------- Backend: FastAPI (uvicorn) ----------
  - type: web
    name: threedpharma-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # set the real value in the dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      # Allow the frontend static site to call this API (CORS).
      - key: CORS_ORIGINS
        value: https://threedpharma-frontend.onrender.com

  # ---------- Frontend: Vite / React static site ----------
  - type: web
    name: threedpharma-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Baked into the build so the SPA knows where the API lives.
      - key: VITE_API_URL
        value: https://threedpharma-backend.onrender.com
    routes:
      # SPA fallback so client-side routes don't 404 on refresh.
      - type: rewrite
        source: /*
        destination: /index.html
